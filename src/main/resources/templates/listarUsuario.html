<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Users</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Poppins';
            background: #0b1220;
            color: #e5e7eb;
        }

        .container { margin-top: 40px; }

        .header {
            display:flex;
            justify-content:space-between;
            align-items:center;
            margin-bottom:20px;
        }

        .title {
            font-size:24px;
            font-weight:600;
        }

        .card {
            background:#111a2e;
            border:none;
            border-radius:16px;
            box-shadow:0 10px 30px rgba(0,0,0,0.4);
        }

        .table {
            color:white;
        }

        .table thead {
            background:#1f2a44;
        }

        tr {
            transition:0.2s;
        }

        tr:hover {
            background:#1f2a44;
            transform: scale(1.01);
        }

        .btn {
            border-radius:10px;
            font-size:13px;
            transition:0.2s;
        }

        .btn:hover {
            transform: translateY(-2px);
        }

        .search {
            width:250px;
        }
    </style>
</head>

<body>

<div class="container">

    <div class="header">

        <div class="title">👤 Usuários</div>

        <div style="display:flex; gap:10px;">
            <input id="search" class="form-control search" placeholder="Buscar...">

            <a class="btn btn-success" th:href="@{/usuario/ui/adicionar}">
                + Novo
            </a>
        </div>

    </div>

    <div class="card p-3">

        <table class="table table-dark table-hover align-middle">

            <thead>
            <tr>
                <th>ID</th>
                <th>Nome</th>
                <th>Email</th>
                <th>CPF</th>
                <th>Idade</th>
                <th>Ações</th>
            </tr>
            </thead>

            <tbody id="tableBody">

            <tr th:each="usuario : ${usuarios}">
                <td th:text="${usuario.id}"></td>
                <td th:text="${usuario.nome}"></td>
                <td th:text="${usuario.email}"></td>
                <td th:text="${usuario.cpf}"></td>
                <td th:text="${usuario.idade}"></td>

                <td style="display:flex; gap:5px;">
                    <a class="btn btn-primary btn-sm"
                       th:href="@{/usuario/ui/listar/{id}(id=${usuario.id})}">
                        Ver
                    </a>

                    <a class="btn btn-warning btn-sm"
                       th:href="@{/usuario/ui/editar/{id}(id=${usuario.id})}">
                        Editar
                    </a>

                    <a class="btn btn-danger btn-sm"
                       onclick="return confirm('Tem certeza que deseja deletar?')"
                       th:href="@{/usuario/ui/deletar/{id}(id=${usuario.id})}">
                        Deletar
                    </a>
                </td>
            </tr>

            </tbody>
        </table>

    </div>
</div>

<script>
    const input = document.getElementById("search");
    const rows = document.querySelectorAll("#tableBody tr");

    input.addEventListener("input", () => {
        const value = input.value.toLowerCase();

        rows.forEach(r => {
            r.style.display = r.innerText.toLowerCase().includes(value) ? "" : "none";
        });
    });
</script>

</body>
</html>
