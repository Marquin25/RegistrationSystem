<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Usuários</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body { background:#0b1220; color:white; }
        .container { margin-top:40px; }
        .card { background:#111a2e; border-radius:16px; padding:20px; }
    </style>
</head>

<body>

<div class="container">

    <div class="d-flex justify-content-between mb-3">

        <h2>👤 Usuários</h2>

        <div style="display:flex; gap:10px;">
            <input id="search" class="form-control search" placeholder="Buscar...">

            <a class="btn btn-success" th:href="@{/usuario/ui/adicionar}">
                + Novo
            </a>

            <a class="btn btn-info" th:href="@{/missoes/ui/listar}">
                🎯 Missões
            </a>
        </div>

    </div>

    <div class="card">

        <table class="table table-dark table-hover">
            <thead>
            <tr>
                <th>ID</th>
                <th>Nome</th>
                <th>Email</th>
                <th>CPF</th>
                <th>Idade</th>
                <th>Ações</th>
            </tr>
            </thead>

            <tbody id="tableBody">
            <tr th:each="usuario : ${usuarios}">
                <td th:text="${usuario.id}"></td>
                <td th:text="${usuario.nome}"></td>
                <td th:text="${usuario.email}"></td>
                <td th:text="${usuario.cpf}"></td>
                <td th:text="${usuario.idade}"></td>

                <td>
                    <a class="btn btn-primary btn-sm"
                       th:href="@{/usuario/ui/{id}(id=${usuario.id})}">
                        Ver
                    </a>

                    <a class="btn btn-warning btn-sm"
                       th:href="@{/usuario/ui/editar/{id}(id=${usuario.id})}">
                        Editar
                    </a>

                    <a class="btn btn-danger btn-sm"
                       th:href="@{/usuario/ui/deletar/{id}(id=${usuario.id})}">
                        Deletar
                    </a>
                </td>
            </tr>
            </tbody>

        </table>

    </div>
</div>

<script>
    const input = document.getElementById("search");
    const rows = document.querySelectorAll("#tableBody tr");

    input.addEventListener("input", () => {
        const value = input.value.toLowerCase();
        rows.forEach(r => {
            r.style.display = r.innerText.toLowerCase().includes(value) ? "" : "none";
        });
    });
</script>

</body>
</html>
