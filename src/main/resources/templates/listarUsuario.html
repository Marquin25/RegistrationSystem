<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestão de Usuários</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #0f172a, #1e293b);
            color: #f1f5f9;
        }

        .container {
            margin-top: 40px;
        }

        .card {
            background-color: #1e293b;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .card-header {
            background: linear-gradient(90deg, #6366f1, #8b5cf6);
            font-size: 1.5rem;
            font-weight: 600;
            text-align: center;
            border-radius: 16px 16px 0 0;
        }

        table {
            color: #f1f5f9;
        }

        th {
            background-color: #334155;
        }

        tr:hover {
            background-color: rgba(99,102,241,0.2);
        }

        .btn-custom {
            border-radius: 10px;
            padding: 5px 10px;
            font-size: 0.85rem;
        }

        .btn-ver { background-color: #3b82f6; }
        .btn-edit { background-color: #f59e0b; }
        .btn-delete { background-color: #ef4444; }

        .top-actions {
            display: flex;
            justify-content: space-between;
            margin-bottom: 15px;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="card">

        <div class="card-header">
            👤 Lista de Usuários
        </div>

        <div class="card-body">

            <div class="top-actions">
                <a class="btn btn-success" th:href="@{/usuario/ui/adicionar}">➕ Novo Usuário</a>
                <input type="text" id="search" class="form-control w-25" placeholder="Buscar...">
            </div>

            <div class="table-responsive">
                <table class="table table-hover align-middle">
                    <thead>
                    <tr>
                        <th>ID</th>
                        <th>Nome</th>
                        <th>Idade</th>
                        <th>Email</th>
                        <th>CPF</th>
                        <th>Ações</th>
                    </tr>
                    </thead>
                    <tbody id="tabela">
                    <tr th:each="usuario : ${usuarios}">
                        <td th:text="${usuario.id}"></td>
                        <td th:text="${usuario.nome}"></td>
                        <td th:text="${usuario.idade}"></td>
                        <td th:text="${usuario.email}"></td>
                        <td th:text="${usuario.cpf}"></td>
                        <td>
                            <a class="btn btn-custom btn-ver" th:href="@{/usuario/ui/listar/{id}(id=${usuario.id})}">Ver</a>
                            <a class="btn btn-custom btn-edit" th:href="@{/usuario/ui/editar/{id}(id=${usuario.id})}">Editar</a>
                            <a class="btn btn-custom btn-delete" th:href="@{/usuario/ui/deletar/{id}(id=${usuario.id})}">Deletar</a>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>

        </div>
    </div>
</div>

<script>
    const input = document.getElementById('search');
    const rows = document.querySelectorAll('#tabela tr');

    input.addEventListener('keyup', function() {
        const value = this.value.toLowerCase();

        rows.forEach(row => {
            row.style.display = row.innerText.toLowerCase().includes(value) ? '' : 'none';
        });
    });
</script>

</body>
</html>
