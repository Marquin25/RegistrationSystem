<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Detalhes do Usuário</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #0f172a, #1e293b);
            color: #fff;
        }

        .container {
            margin-top: 50px;
        }

        .card {
            background-color: #1e293b;
            border-radius: 18px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border: none;
        }

        .card-header {
            background: linear-gradient(90deg, #6366f1, #8b5cf6);
            border-radius: 18px 18px 0 0;
            font-size: 1.5rem;
            font-weight: 600;
            text-align: center;
        }

        .info-box {
            background-color: #0f172a;
            padding: 12px;
            border-radius: 10px;
            margin-bottom: 10px;
        }

        .label {
            color: #94a3b8;
            font-size: 0.9rem;
        }

        .value {
            font-size: 1.1rem;
            font-weight: 500;
        }

        table {
            color: #fff;
        }

        th {
            background-color: #334155 !important;
        }

        tr:hover {
            background-color: rgba(99,102,241,0.2);
        }

        .btn-back {
            margin-top: 20px;
            background-color: #3b82f6;
            border: none;
            padding: 10px 20px;
            border-radius: 10px;
            color: white;
            text-decoration: none;
            display: inline-block;
        }

        .btn-back:hover {
            background-color: #2563eb;
        }

        .title {
            text-align: center;
            margin-bottom: 20px;
        }
    </style>
</head>

<body>

<div class="container">

    <h2 class="title">👤 Detalhes do Usuário</h2>

    <div class="card p-4">

        <div class="card-header">
            <span th:text="${usuario.nome}"></span>
        </div>

        <div class="card-body">

            <div class="info-box">
                <div class="label">CPF</div>
                <div class="value" th:text="${usuario.cpf}"></div>
            </div>

            <div class="info-box">
                <div class="label">Email</div>
                <div class="value" th:text="${usuario.email}"></div>
            </div>

            <div class="info-box">
                <div class="label">Idade</div>
                <div class="value" th:text="${usuario.idade}"></div>
            </div>

            <hr class="text-light">

            <h5>🎯 Missões</h5>

            <div class="table-responsive">
                <table class="table table-dark table-hover mt-3">
                    <thead>
                    <tr>
                        <th>Nome</th>
                        <th>Dificuldade</th>
                    </tr>
                    </thead>

                    <tbody>
                    <tr th:each="missao : ${usuario.missoes}">
                        <td th:text="${missao.nome}"></td>
                        <td th:text="${missao.dificuldade}"></td>
                    </tr>
                    </tbody>
                </table>
            </div>

            <a class="btn-back" th:href="@{/usuario/ui/listar}">
                ⬅ Voltar
            </a>

        </div>
    </div>
</div>

</body>
</html>
