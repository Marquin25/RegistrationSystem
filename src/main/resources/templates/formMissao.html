<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Missão</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-dark text-white">

<div class="container mt-5 col-md-5">

    <h3 th:text="${missao.id} == null ? 'Criar Missão' : 'Editar Missão'"></h3>

    <form th:object="${missao}"
          th:action="${missao.id} == null ? @{/missoes/ui/salvar} : @{'/missoes/ui/atualizar/' + ${missao.id}}"
          method="post">

        <label>Nome</label>
        <input type="text" class="form-control" th:field="*{nome}" required>

        <label>Dificuldade</label>
        <input type="text" class="form-control" th:field="*{dificuldade}" required>

        <button class="btn btn-success w-100 mt-3">
            Salvar
        </button>
    </form>

    <a th:href="@{/missoes/ui/listar}" class="btn btn-secondary mt-2">
        Voltar
    </a>

</div>

</body>
</html>
