<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Detalhes</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-dark text-white">

<div class="container mt-5">

    <h2>📄 Detalhes da Missão</h2>

    <div class="card bg-secondary p-3">
        <p><strong>ID:</strong> <span th:text="${missao.id}"></span></p>
        <p><strong>Nome:</strong> <span th:text="${missao.nome}"></span></p>
        <p><strong>Dificuldade:</strong> <span th:text="${missao.dificuldade}"></span></p>
    </div>

    <a class="btn btn-secondary mt-3" th:href="@{/missoes/ui/listar}">
        Voltar
    </a>

</div>

</body>
</html>
