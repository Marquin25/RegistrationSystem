<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Missões</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-dark text-white">

<div class="container mt-4">

    <div class="d-flex justify-content-between mb-3">
        <h2>🎯 Missões</h2>

        <div>
            <a class="btn btn-success" th:href="@{/missoes/ui/adicionar}">
                + Nova Missão
            </a>

            <a class="btn btn-secondary" th:href="@{/usuario/ui/listar}">
                Voltar Usuários
            </a>
        </div>
    </div>

    <table class="table table-dark table-hover">

        <thead>
        <tr>
            <th>ID</th>
            <th>Nome</th>
            <th>Dificuldade</th>
            <th>Ações</th>
        </tr>
        </thead>

        <tbody>
        <tr th:each="missao : ${missoes}">
            <td th:text="${missao.id}"></td>
            <td th:text="${missao.nome}"></td>
            <td th:text="${missao.dificuldade}"></td>

            <td>
                <a class="btn btn-primary btn-sm"
                   th:href="@{/missoes/ui/{id}(id=${missao.id})}">
                    Ver
                </a>

                <a class="btn btn-warning btn-sm"
                   th:href="@{/missoes/ui/editar/{id}(id=${missao.id})}">
                    Editar
                </a>

                <a class="btn btn-danger btn-sm"
                   th:href="@{/missoes/ui/deletar/{id}(id=${missao.id})}">
                    Deletar
                </a>
            </td>
        </tr>
        </tbody>

    </table>

</div>

</body>
</html>
