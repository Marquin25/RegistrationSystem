<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Usuário</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #0f172a, #1e293b);
            color: #fff;
        }

        .container {
            margin-top: 60px;
        }

        .card {
            background-color: #1e293b;
            border-radius: 18px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .card-header {
            background: linear-gradient(90deg, #6366f1, #8b5cf6);
            text-align: center;
            font-size: 1.4rem;
            font-weight: bold;
        }

        label {
            margin-top: 10px;
        }

        input {
            background-color: #0f172a !important;
            border: 1px solid #334155 !important;
            color: #fff !important;
        }

        input:focus {
            box-shadow: none;
            border-color: #6366f1 !important;
        }

        .btn-primary {
            background: #6366f1;
            border: none;
        }

        .btn-primary:hover {
            background: #4f46e5;
        }

        .btn-back {
            display: inline-block;
            margin-top: 10px;
            color: #94a3b8;
            text-decoration: none;
        }
    </style>
</head>

<body>

<div class="container col-md-5">

    <div class="card p-4">

        <div class="card-header text-white">
            <span th:text="${usuario.id} == null ? '➕ Criar Usuário' : '✏️ Editar Usuário'"></span>
        </div>

        <div class="card-body">

            <form th:object="${usuario}"
                  th:action="${usuario.id} == null ? @{/usuario/ui/salvar} : @{'/usuario/ui/atualizar/' + ${usuario.id}}"
                  method="post">

                <label>Nome</label>
                <input type="text" class="form-control" th:field="*{nome}" required>

                <label>Email</label>
                <input type="email" class="form-control" th:field="*{email}" required>

                <label>CPF</label>
                <input type="text" class="form-control" th:field="*{cpf}" required>

                <label>Idade</label>
                <input type="number" class="form-control" th:field="*{idade}" required>

                <button class="btn btn-primary w-100 mt-3">
                    Salvar
                </button>

            </form>

            <a class="btn-back" th:href="@{/usuario/ui/listar}">
                ← Voltar
            </a>

        </div>
    </div>

</div>

</body>
</html>
